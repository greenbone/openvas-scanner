Status:
  description: "The status of a scan"
  type: "object"
  properties:
    start_time:
      description: "A UNIX time format describing when the scan started."
      type: "integer"
      format: "int32"
    end_time:
      description: "A UNIX time format describing when the scan ended."
      type: "integer"
      format: "int32"
    status:
      description: "In which phase the scan is currently in."
      type: "string"
      enum:
      - stored
      - requested
      - running
      - stopped
      - failed
      - succeeded
    host_info:
      $ref: "#/HostInfo"
  required:
  - status

HostInfo:
  description: "Information about the progress for each host of the scan."
  type: "object"
  properties:
    all:
      description: "The total number of theoretical hosts that are part of the scan. Theoretical means,
        that they might not be reachable and are not necessarily scanned. This number is not
        necessarily the sum of dead and alive, as the alive detection might not be finished yet."
      type: "integer"
      format: "int32"
    excluded:
      description: "The number of hosts that are excluded from the scan."
      type: "integer"
      format: "int32"
    dead:
      description: "The number of host detected as not reachable."
      type: "integer"
      format: "int32"
    alive:
      description: "The number of hosts that are reachable and will be scanned."
      type: "integer"
      format: "int32"
    queued:
      description: "The number of hosts that are waiting to be scanned."
      type: "integer"
      format: "int32"
    finished:
      description: "The number hosts that are finished with scanning."
      type: "integer"
      format: "int32"
    scanning:
      description: "List of hosts that are currently being scanned, including the progress of them."
      type: "array"
      items:
        type: "object"
        properties:
          host:
            description: "The host for which the progress is given."
            type: "string"
          checks:
            description: "Information about the progress of the scan. It is called checks to keep it as generic
              as possible."
            type: "object"
            properties:
              total:
                description: "The total number of checks that are run for the host."
                type: "integer"
                format: "int32"
              executed:
                description: "The number of checks that were already executed for the host."
                type: "integer"
                format: "int32"
          total_vts:
            description: "The total number of VTs that are run for the host."
            type: "integer"
            format: "int32"
          finished_vts:
            description: "The number of VTs that are finished for the host."
            type: "integer"
            format: "int32"
  required:
  - all
  - excluded
  - dead
  - alive
  - queued
  - finished
