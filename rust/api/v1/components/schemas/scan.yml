ScanIDString:
  description: "A scan ID to identify a scan."
  type: "string"

ScanReq:
  description: "Model representing a scan request."
  type: "object"
  properties:
    target:
      $ref: "./target.yml#/Target"
    scan_preferences:
      description: "Overwrite the default settings of the Scanner."
      type: "array"
      items:
        $ref: "#/ScannerPreference"
    vts:
      type: "array"
      description: "A collection of VTs, which are run for the given target."
      items:
        $ref: "./target.yml#/VT"
  required:
  - target
  - vts

ScanResp:
  description: "Model representing a scan response."
  type: "object"
  properties:
    scan_id:
      $ref: "#/ScanIDString"
    target:
      $ref: "./target.yml#/Target"
    scan_preferences:
      description: "Overwrite the default settings of the Scanner."
      type: "array"
      items:
        $ref: "#/ScannerPreference"
    vts:
      type: "array"
      description: "A collection of VTs, which are run for the given target."
      items:
        $ref: "./target.yml#/VT"
  required:
  - target
  - vts

ScanActionBody:
  description: "An action to perform on a scan"
  type: "object"
  properties:
    action:
      description: "The action to perform"
      type: "string"
      enum:
      - start
      - stop
  required:
  - "action"

ScannerPreference:
  description: "Consists of a preference ID and its value."
  type: "object"
  properties:
    id:
      description: "ID of the preference to set."
      type: "string"
    value:
      description: "Value of the preference."
      type: "string"
  required:
  - value
  - id

Preferences:
  description: "List of preferences available"
  type: "array"
  items:
    type: "object"
    properties:
      id:
        description: "ID of the preference"
        type: "string"
      type:
        description: "Type of the preference"
        type: "string"
      name:
        description: "Display name for the preference"
        type: "string"
      description:
        description: "Description of the preference"
        type: "string"
      default:
        description: "Default value for scans"
        type: "string"
      values:
        description: "Allowed values"
        type: "string"
