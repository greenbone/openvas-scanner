[feed]
path = 'examples/feed/nasl'
check_interval = '3600s'
signature_check = false
lock_file_dir = '/tmp'

[listener]
address = '127.0.0.1:0'

[notus]
products_path = 'examples/feed/notus/products'
advisories_path = 'examples/feed/notus/advisories'

[scheduler]
check_interval = '10ms'

[scanner]
type = 'openvasd'
