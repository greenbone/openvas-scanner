services:
  openvasd:
    image: ${OPENVAS_IMAGE:-ghcr.io/greenbone/openvas-scanner:stable}
    cap_add:
      - NET_RAW
      - NET_ADMIN
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: ${OPENVASD_MEMORY_LIMIT:-0}
        reservations:
          memory: ${OPENVASD_RESERVATION:-0}
      restart_policy:
        condition: ${OPENVASD_RESTART_CONDITION:-on-failure}
        delay: '3s'
    environment:
      SCANNER_TYPE: ${SCANNER_TYPE:-openvas}
      GNUPGHOME: /etc/openvas/gnupg
      XDG_CACHE_HOME: /var/cache/
      STORAGE_TYPE: ${OPENVAS_SCANNER_STORAGE_TYPE:-fs}
      LISTENING: 0.0.0.0:3000
      OPENVASD_LOG: INFO
    volumes:
      - openvas_data_vol:/etc/openvas
      - openvas_log_data_vol:/var/log/openvas
      - gpg_data_vol:/etc/openvas/gnupg
      - notus_data_vol:/var/lib/notus
      - vt_data_vol:/var/lib/openvas/plugins
      - redis_socket_vol:/run/redis/
      - openvasd_cache_vol:/var/cache/
    # enable port forwarding when you want to use the http api from your host machine
    # TODO: configurable
    ports:
      - ${OPENVASD_EXTERNAL_BIND_ADDRESS:-127.0.0.1:3000}:3000
    depends_on:
      vulnerability-tests:
        condition: service_completed_successfully
      configure-openvas-log:
        condition: service_completed_successfully
      configure-openvas:
        condition: service_completed_successfully
      gpg-data:
        condition: service_completed_successfully
    networks:
      default:
        aliases:
          - openvasd
