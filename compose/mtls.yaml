name: openvasd-community-edition-tls

services:
  configure-openvas:
    image: ${OPENVAS_IMAGE:-ghcr.io/greenbone/openvas-scanner:stable}
    volumes:
      - openvas_data_vol:/mnt
    environment:
      OPENVASD_PROTOCOL: https
      OPENVASD_PORT: 3000
    command:
      - /bin/sh
      - -c
      - |
        printf "table_driven_lsc = yes\nopenvasd_server = $$OPENVASD_PROTOCOL://openvasd:$$OPENVASD_PORT\n" > /mnt/openvas.conf
        printf "[feed]\npath = '%s'\ncheck_interval = '%ss'\nsignature_check = %s\n" "$$FEED_PATH" "$$FEED_CHECK_INTERVAL" "$$OPENVASD_FEED_SIGNATURE_CHECK" > /mnt/openvasd.toml
        chmod 644 /mnt/openvas.conf
        chmod 644 /mnt/openvasd.toml

  openvasd:
    environment:
      TLS_CERTS: /var/lib/openvasd/certs/server.pem
      TLS_KEY: /var/lib/openvasd/certs/server.key
      TLS_CLIENT_CERTS: /var/lib/openvasd/certs/clients/
    volumes:
      - ${OPENVASD_CERTS:-./certs}:/var/lib/openvasd/certs:ro,z
