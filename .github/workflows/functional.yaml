name: functional

# github.event.pull_request.number

on:
  workflow_call:
    inputs:
      image:
        description: "The image to test"
        required: true
        type: string

jobs:
  # Tests that gvm-libs, openvas-smb and openvas dependencies work together and
  # that openvas is buildable and integrates openvas-smb when available
  distributed-monolith-railguard:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        system:
          - debian_stable
          - debian_bookworm
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/copy-docker-binaries
        with:
          arch: amd64 
      - run: ./check.sh --verbose ci-railguard
        env:
          RAILGUARD_SYSTEM: ${{ matrix.system }}
  tests:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    container:
      image: ${{ inputs.image }}
      options: --privileged
    steps:
      - uses: actions/checkout@v7
      - name: prepare setup
        run: |
          apt-get update && apt-get install --no-install-recommends --no-install-suggests -y \
            docker.io docker-cli \
            make
          FEED_DIR="feed/" sh .github/prepare-feed.sh
          echo "db_address = tcp://redis:6379" >> /etc/openvas/openvas.conf
          mv ./feed/* "$(openvas -s | grep plugins_folder | sed 's/plugins_folder = //')/"
      - run: openvas -s
      - name: verify feed syntax
        run: ./check.sh --verbose ci-feed-syntax
      - name: verify nasl tests
        run: ./check.sh --verbose ci-nasl-tests
      - uses: actions/setup-go@v7
        with:
          go-version: '>=1.16.0'
      - name: verify lint
        run: ./check.sh --verbose ci-nasl-lint
